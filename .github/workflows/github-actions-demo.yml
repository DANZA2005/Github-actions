name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hola Seguidores de la grasaaaa :vvvv"
      - run: echo "Escribe en este archivo" > file.txt
      - run: ls -al
      - run: cat file.txt
      - run: rm -rf file.txt
      - run: ls -al
      - name: Checkout enviroment
        uses: actions/checkout@v6
      - name: Definiendo variable
        run: echo "USERNAME= ${{ github.actor }}" >> $GITHUB_ENV
      - run: echo $PATH
      - name: Ejecutando script
        run: python app.py

